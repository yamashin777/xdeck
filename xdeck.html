<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="X ランチャー">
<meta name="theme-color" content="#0f0f0f">
<title>X ランチャー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #262626;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0; --muted: #666;
  --accent: #1d9bf0; --accent-dim: rgba(29,155,240,0.12); --accent-border: rgba(29,155,240,0.3);
  --danger: #e0445a; --radius: 12px; --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* ヘッダー */
#header { padding: calc(var(--safe-top) + 12px) 16px 12px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo { width: 28px; height: 28px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo svg { width: 14px; height: 14px; fill: #fff; }
#header-title { font-size: 15px; font-weight: 600; flex: 1; letter-spacing: -0.3px; }
#add-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--surface2); border: none; color: var(--accent); font-size: 22px; line-height: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

/* リスト */
#list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 12px calc(var(--safe-bottom) + 16px); }

/* グループ */
.group-header { display: flex; align-items: center; padding: 16px 4px 6px; gap: 6px; cursor: pointer; user-select: none; }
.group-chevron { font-size: 10px; color: var(--muted); transition: transform 0.2s; display: inline-block; }
.group-chevron.open { transform: rotate(90deg); }
.group-name { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); flex: 1; }
.group-open-all { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; font-family: inherit; padding: 4px 6px; }
.group-items.collapsed { display: none; }

/* アイテム */
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: var(--radius); margin-bottom: 4px; cursor: pointer; background: var(--surface); border: 1px solid var(--border); position: relative; transition: background 0.1s; }
.nav-item:active { background: var(--surface2); }
.nav-item.active { background: var(--surface2); border-color: var(--accent-border); }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 2px; background: var(--accent); }

/* アバター */
.nav-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--muted); flex-shrink: 0; overflow: hidden; }
.nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
.nav-avatar.list-av { border-radius: 8px; background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.nav-avatar svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
.nav-info { flex: 1; min-width: 0; }
.nav-label { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-url { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.nav-arrow { font-size: 18px; color: var(--muted); flex-shrink: 0; line-height: 1; }

.add-group-btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 12px; background: none; border: 1px dashed var(--border2); border-radius: var(--radius); color: var(--muted); font-size: 13px; font-family: inherit; cursor: pointer; margin-top: 12px; }
.empty { text-align: center; padding: 24px 16px; color: var(--muted); font-size: 13px; }

/* モーダル（下から） */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; display: flex; align-items: flex-end; }
.modal { background: #1c1c1e; border-radius: 20px 20px 0 0; padding: 8px 20px calc(var(--safe-bottom) + 20px); width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 8px auto 18px; }
.modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 18px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
.form-row input, .form-row select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: 16px; padding: 12px 14px; outline: none; -webkit-appearance: none; }
.form-row input:focus, .form-row select:focus { border-color: var(--accent); }
.form-row input::placeholder { color: var(--muted); }
.modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
.btn { width: 100%; padding: 15px; border-radius: var(--radius); font-size: 16px; font-weight: 500; font-family: inherit; cursor: pointer; border: none; background: var(--surface2); color: var(--text); }
.btn.primary { background: var(--accent); color: #fff; }
.btn.danger { background: var(--danger); color: #fff; }
.btn.cancel { background: transparent; color: var(--muted); font-weight: 400; }

/* アクションシート */
.action-sheet { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 0 8px calc(var(--safe-bottom) + 8px); }
.action-body { width: 100%; background: #1c1c1e; border-radius: 14px; overflow: hidden; margin-bottom: 8px; }
.action-title { padding: 14px 16px 10px; font-size: 13px; color: var(--muted); text-align: center; border-bottom: 1px solid var(--border); }
.action-item { display: flex; align-items: center; justify-content: center; padding: 17px 16px; font-size: 16px; cursor: pointer; border-bottom: 1px solid var(--border); color: var(--text); }
.action-item:last-child { border-bottom: none; }
.action-item.danger { color: var(--danger); }
.action-cancel { width: 100%; background: #1c1c1e; border-radius: 14px; padding: 17px; text-align: center; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    </div>
    <span id="header-title">X ランチャー</span>
    <button id="add-btn">＋</button>
  </div>
  <div id="list-wrap"></div>
</div>
<div id="modal-root"></div>
<div id="sheet-root"></div>

<script>
const IC_LIST = '<svg viewBox="0 0 24 24"><line x1="8" y1="5" x2="20" y2="5"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="19" x2="20" y2="19"/><line x1="3" y1="5" x2="3.01" y2="5"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="19" x2="3.01" y2="19"/></svg>';

const DEFAULT_GROUPS = [
  {id:'g1',name:'アカウント',open:true},
  {id:'g2',name:'リスト',open:true},
];
const DEFAULT_ITEMS = [
  {id:'i1',gid:'g1',label:'岐阜暴威',               url:'https://x.com/gihuboy?lang=ja',           type:'account'},
  {id:'i2',gid:'g1',label:'吉田製作所',              url:'https://x.com/netatank?lang=ja',          type:'account'},
  {id:'i3',gid:'g1',label:'ひよの⛄️レバナス全力ガール',url:'https://x.com/hiyono_leverage?lang=ja', type:'account'},
  {id:'i4',gid:'g1',label:'えりこ',                  url:'https://x.com/Rdh47nR6HshJl90',          type:'account'},
  {id:'i5',gid:'g1',label:'テスタ',                  url:'https://x.com/tesuta001?lang=ja',         type:'account'},
  {id:'i6',gid:'g2',label:'youtuber',               url:'https://x.com/i/lists/973136757859401728',type:'list'},
  {id:'i7',gid:'g2',label:'k',                      url:'https://x.com/i/lists/30415907',          type:'list'},
  {id:'i8',gid:'g2',label:'Economy',                url:'https://x.com/i/lists/982878496321028096',type:'list'},
];

let groups=[], items=[], activeId=null;

function loadData(){
  try {
    groups = JSON.parse(localStorage.getItem('xlauncher_groups')) || JSON.parse(JSON.stringify(DEFAULT_GROUPS));
    items  = JSON.parse(localStorage.getItem('xlauncher_items'))  || JSON.parse(JSON.stringify(DEFAULT_ITEMS));
    const last = localStorage.getItem('xlauncher_last_url');
    activeId = last ? (items.find(i=>i.url===last)||{}).id||null : null;
  } catch(e) {
    groups=JSON.parse(JSON.stringify(DEFAULT_GROUPS));
    items=JSON.parse(JSON.stringify(DEFAULT_ITEMS));
  }
}
function saveData(){ localStorage.setItem('xlauncher_groups',JSON.stringify(groups)); localStorage.setItem('xlauncher_items',JSON.stringify(items)); }

function openUrl(item){
  activeId=item.id;
  localStorage.setItem('xlauncher_last_url',item.url);
  renderList();
  window.location.href=item.url;
}

function initials(l){ return (l||'?').replace(/[^\p{L}\p{N}]/gu,'').slice(0,2).toUpperCase()||'?'; }

function makeAvatar(item){
  const div=document.createElement('div');
  if(item.type==='list'){ div.className='nav-avatar list-av'; div.innerHTML=IC_LIST; return div; }
  div.className='nav-avatar';
  const handle=(item.url.match(/x\.com\/([^/?]+)/)||[])[1]||'';
  if(handle){
    const img=document.createElement('img');
    img.src=`https://unavatar.io/twitter/${handle}`;
    img.alt=item.label;
    img.addEventListener('error',()=>{ div.textContent=initials(item.label); });
    div.appendChild(img);
  } else { div.textContent=initials(item.label); }
  return div;
}

function shortUrl(url){ return url.replace('https://x.com/','@').replace('?lang=ja','').replace('/i/lists/','list/'); }

function renderList(){
  const wrap=document.getElementById('list-wrap');
  wrap.innerHTML='';
  groups.forEach(g=>{
    const gItems=items.filter(i=>i.gid===g.id);
    const gh=document.createElement('div');
    gh.className='group-header';
    gh.innerHTML=`<span class="group-chevron ${g.open?'open':''}">▶</span><span class="group-name">${g.name}</span><button class="group-open-all">すべて開く</button>`;
    gh.querySelector('.group-chevron').addEventListener('click',()=>toggleGroup(g.id));
    gh.querySelector('.group-name').addEventListener('click',()=>toggleGroup(g.id));
    gh.querySelector('.group-open-all').addEventListener('click',(e)=>{
      e.stopPropagation();
      gItems.forEach((item,i)=>setTimeout(()=>window.open(item.url,'_blank'),i*300));
    });
    wrap.appendChild(gh);

    const gi=document.createElement('div');
    gi.className=`group-items${g.open?'':' collapsed'}`;
    if(!gItems.length){ gi.innerHTML='<div class="empty">アイテムがありません</div>'; }

    gItems.forEach(item=>{
      const el=document.createElement('div');
      el.className=`nav-item${item.id===activeId?' active':''}`;
      el.appendChild(makeAvatar(item));
      const info=document.createElement('div');
      info.className='nav-info';
      info.innerHTML=`<div class="nav-label">${item.label}</div><div class="nav-url">${shortUrl(item.url)}</div>`;
      el.appendChild(info);
      const arr=document.createElement('span');
      arr.className='nav-arrow'; arr.textContent='›';
      el.appendChild(arr);

      el.addEventListener('click',()=>openUrl(item));

      let pt;
      el.addEventListener('touchstart',()=>{ pt=setTimeout(()=>showActionSheet(item),600); },{passive:true});
      el.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
      el.addEventListener('touchmove',()=>clearTimeout(pt),{passive:true});
      gi.appendChild(el);
    });
    wrap.appendChild(gi);
  });

  const agb=document.createElement('button');
  agb.className='add-group-btn';
  agb.textContent='＋ グループを追加';
  agb.addEventListener('click',()=>showAddGroupModal());
  wrap.appendChild(agb);
}

function toggleGroup(gid){ const g=groups.find(g=>g.id===gid); if(g){g.open=!g.open;saveData();renderList();} }

function showActionSheet(item){
  const root=document.getElementById('sheet-root');
  root.innerHTML=`<div class="action-sheet" id="as"><div class="action-body"><div class="action-title">${item.label}</div><div class="action-item" id="as-open">Xで開く</div><div class="action-item" id="as-edit">編集</div><div class="action-item danger" id="as-del">削除</div></div><div class="action-cancel" id="as-cancel">キャンセル</div></div>`;
  root.querySelector('#as-open').addEventListener('click',()=>{closeSheet();openUrl(item);});
  root.querySelector('#as-edit').addEventListener('click',()=>{closeSheet();showEditModal(item.id);});
  root.querySelector('#as-del').addEventListener('click',()=>{closeSheet();deleteItem(item.id);});
  root.querySelector('#as-cancel').addEventListener('click',closeSheet);
  root.querySelector('#as').addEventListener('click',(e)=>{if(e.target.id==='as')closeSheet();});
}
function closeSheet(){ document.getElementById('sheet-root').innerHTML=''; }

function showModal(html,onConfirm,onDelete){
  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="modal-bg" id="mb"><div class="modal"><div class="modal-handle"></div>${html}</div></div>`;
  root.querySelector('#mb').addEventListener('click',(e)=>{if(e.target.id==='mb')closeModal();});
  const cb=root.querySelector('#confirmBtn'); if(cb&&onConfirm)cb.addEventListener('click',onConfirm);
  const xb=root.querySelector('#cancelBtn');  if(xb)xb.addEventListener('click',closeModal);
  const db=root.querySelector('#deleteBtn');  if(db&&onDelete)db.addEventListener('click',()=>{closeModal();onDelete();});
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

function showAddModal(defaultGid){
  const opts=groups.map(g=>`<option value="${g.id}"${g.id===defaultGid?' selected':''}>${g.name}</option>`).join('');
  showModal(`<h3>フィードを追加</h3>
    <div class="form-row"><label>グループ</label><select id="inp-gid">${opts}</select></div>
    <div class="form-row"><label>X の URL</label><input id="inp-url" type="url" placeholder="https://x.com/username" inputmode="url"></div>
    <div class="form-row"><label>表示名（省略で自動）</label><input id="inp-label" type="text" placeholder="例: テスタ"></div>
    <div class="modal-actions"><button class="btn primary" id="confirmBtn">追加</button><button class="btn cancel" id="cancelBtn">キャンセル</button></div>`,
    ()=>{
      const url=document.getElementById('inp-url').value.trim();
      const label=document.getElementById('inp-label').value.trim();
      const gid=document.getElementById('inp-gid').value;
      if(!url)return;
      const isList=url.includes('/i/lists/');
      const auto=isList?(url.match(/lists\/(\d+)/)||[])[1]||'リスト':(url.match(/x\.com\/([^/?]+)/)||[])[1]||url;
      items.push({id:'i'+Date.now(),gid,label:label||auto,url:url.startsWith('http')?url:'https://'+url,type:isList?'list':'account'});
      saveData();closeModal();renderList();
    });
  setTimeout(()=>document.getElementById('inp-url').focus(),100);
}

function showEditModal(id){
  const item=items.find(i=>i.id===id); if(!item)return;
  const opts=groups.map(g=>`<option value="${g.id}"${g.id===item.gid?' selected':''}>${g.name}</option>`).join('');
  showModal(`<h3>フィードを編集</h3>
    <div class="form-row"><label>グループ</label><select id="inp-gid">${opts}</select></div>
    <div class="form-row"><label>表示名</label><input id="inp-label" type="text" value="${item.label}"></div>
    <div class="form-row"><label>URL</label><input id="inp-url" type="url" value="${item.url}" inputmode="url"></div>
    <div class="modal-actions"><button class="btn primary" id="confirmBtn">保存</button><button class="btn danger" id="deleteBtn">削除</button><button class="btn cancel" id="cancelBtn">キャンセル</button></div>`,
    ()=>{
      item.label=document.getElementById('inp-label').value.trim()||item.label;
      item.url=document.getElementById('inp-url').value.trim()||item.url;
      item.gid=document.getElementById('inp-gid').value;
      item.type=item.url.includes('/i/lists/')?'list':'account';
      saveData();closeModal();renderList();
    },
    ()=>deleteItem(id));
}

function deleteItem(id){
  const item=items.find(i=>i.id===id); if(!item)return;
  if(!confirm(`「${item.label}」を削除しますか？`))return;
  items=items.filter(i=>i.id!==id);
  if(activeId===id)activeId=null;
  saveData();renderList();
}

function showAddGroupModal(){
  showModal(`<h3>グループを追加</h3>
    <div class="form-row"><label>グループ名</label><input id="inp-gname" type="text" placeholder="例: FIRE情報"></div>
    <div class="modal-actions"><button class="btn primary" id="confirmBtn">作成</button><button class="btn cancel" id="cancelBtn">キャンセル</button></div>`,
    ()=>{
      const name=document.getElementById('inp-gname').value.trim(); if(!name)return;
      groups.push({id:'g'+Date.now(),name,open:true});
      saveData();closeModal();renderList();
    });
  setTimeout(()=>document.getElementById('inp-gname').focus(),100);
}

loadData();
renderList();
document.getElementById('add-btn').addEventListener('click',()=>showAddModal(groups[0]?.id));
</script>
</body>
</html>
