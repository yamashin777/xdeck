<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>xdeck</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 220px;
  --sidebar-w-collapsed: 56px;
  --header-h: 48px;
  --accent: #1a8cd8;
  --accent-hover: #1671b3;
  --bg: #f7f9fa;
  --bg-panel: #ffffff;
  --bg-sidebar: #0f1117;
  --bg-sidebar-hover: #1a1f2e;
  --bg-sidebar-active: #1d2640;
  --text-primary: #0f0f0f;
  --text-secondary: #555;
  --text-muted: #888;
  --text-sidebar: #c8cdd8;
  --text-sidebar-active: #ffffff;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
  --radius: 10px;
  --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d0d0d;
    --bg-panel: #111318;
    --text-primary: #f0f0f0;
    --text-secondary: #aaa;
    --text-muted: #666;
    --border: rgba(255,255,255,0.07);
  }
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  overflow: hidden;
}

/* ── Layout ── */
#app {
  display: flex;
  height: 100vh;
  height: 100dvh;
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  display: flex;
  flex-direction: column;
  transition: width var(--transition), min-width var(--transition);
  overflow: hidden;
  z-index: 30;
  flex-shrink: 0;
}
#sidebar.collapsed {
  width: var(--sidebar-w-collapsed);
  min-width: var(--sidebar-w-collapsed);
}

#sidebar-header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.logo {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
  white-space: nowrap;
  opacity: 1;
  transition: opacity var(--transition);
}
.logo span { color: var(--accent); }
#sidebar.collapsed .logo { opacity: 0; width: 0; overflow: hidden; }

#collapse-btn {
  margin-left: auto;
  width: 28px; height: 28px;
  border-radius: 6px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: var(--text-sidebar);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 13px;
  transition: background 0.15s;
}
#collapse-btn:hover { background: rgba(255,255,255,0.16); }
#sidebar.collapsed #collapse-btn { margin-left: 0; }

/* Nav list */
#nav-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

.nav-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.28);
  padding: 12px 16px 4px;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  transition: opacity var(--transition);
}
#sidebar.collapsed .nav-section-label { opacity: 0; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 14px;
  cursor: pointer;
  color: var(--text-sidebar);
  border-radius: 0;
  transition: background 0.14s, color 0.14s;
  user-select: none;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-item:hover { background: var(--bg-sidebar-hover); color: #fff; }
.nav-item.active {
  background: var(--bg-sidebar-active);
  color: var(--text-sidebar-active);
  border-left-color: var(--accent);
}
.nav-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.nav-icon img { width: 100%; height: 100%; object-fit: cover; }
.nav-label {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  transition: opacity var(--transition), width var(--transition);
}
#sidebar.collapsed .nav-label { opacity: 0; width: 0; }
.nav-type-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 99px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
  transition: opacity var(--transition);
}
#sidebar.collapsed .nav-type-badge { opacity: 0; }

/* Tooltip on collapsed */
#sidebar.collapsed .nav-item::after {
  content: attr(data-label);
  position: absolute;
  left: calc(var(--sidebar-w-collapsed) + 6px);
  background: rgba(20,24,36,0.96);
  color: #fff;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
}
#sidebar.collapsed .nav-item:hover::after { opacity: 1; }

/* Add button */
#add-btn-wrap {
  padding: 10px 10px 14px;
  flex-shrink: 0;
  border-top: 1px solid rgba(255,255,255,0.06);
}
#add-btn {
  width: 100%;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px dashed rgba(255,255,255,0.2);
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  font-family: inherit;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap;
  overflow: hidden;
}
#add-btn:hover { border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.85); }
.add-btn-label { transition: opacity var(--transition); }
#sidebar.collapsed .add-btn-label { opacity: 0; width: 0; overflow: hidden; }

/* ── Main ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* Top bar */
#topbar {
  height: var(--header-h);
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  flex-shrink: 0;
}
#current-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#current-url {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 280px;
}
#open-x-btn {
  padding: 6px 12px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  text-decoration: none;
  display: flex; align-items: center; gap: 5px;
  transition: background 0.14s;
}
#open-x-btn:hover { background: var(--bg); }

/* Frame area */
#frame-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg-panel);
}

/* Twitter timeline embed */
#timeline-container {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
  padding: 16px 8px 24px;
  background: var(--bg);
  -webkit-overflow-scrolling: touch;
}

#timeline-inner {
  width: 100%;
  max-width: 600px;
}

.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--text-muted);
}
.placeholder .big-icon { font-size: 48px; }
.placeholder p { font-size: 14px; }

/* Loading overlay */
#loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 10;
  transition: opacity 0.3s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Modal */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal {
  background: var(--bg-panel);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.modal h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 14px;
  color: var(--text-primary);
}
.form-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}
.form-row label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}
.form-row input {
  padding: 9px 11px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-primary);
  font-size: 13px;
  font-family: inherit;
  width: 100%;
}
.form-row input:focus { outline: none; border-color: var(--accent); }
.form-row input::placeholder { color: var(--text-muted); }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}
.btn {
  padding: 8px 16px;
  border-radius: 7px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-primary);
}
.btn:hover { background: var(--bg-sidebar-hover); color: #fff; border-color: transparent; }
.btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
.btn.primary:hover { background: var(--accent-hover); }
.btn.danger { background: #dc2626; color: #fff; border-color: transparent; }
.btn.danger:hover { opacity: 0.88; }

/* Context menu */
.ctx-menu {
  position: fixed;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.16);
  z-index: 150;
  overflow: hidden;
  min-width: 140px;
}
.ctx-item {
  padding: 9px 14px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
}
.ctx-item:hover { background: var(--bg); }
.ctx-item.danger { color: #dc2626; }

/* Mobile overlay sidebar */
#sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 25;
}

@media (max-width: 640px) {
  :root { --sidebar-w: 200px; }
  #sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    transform: translateX(-100%);
    transition: transform var(--transition);
    width: var(--sidebar-w) !important;
    min-width: var(--sidebar-w) !important;
    z-index: 30;
  }
  #sidebar.mobile-open {
    transform: translateX(0);
  }
  #sidebar-overlay { display: block; }
  #sidebar-overlay.visible { display: block; }
  #main { width: 100%; }
  #mobile-menu-btn { display: flex !important; }
  #collapse-btn { display: none; }
  .logo { opacity: 1 !important; width: auto !important; }
}

#mobile-menu-btn {
  display: none;
  width: 32px; height: 32px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-primary);
  cursor: pointer;
  align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-header">
      <div class="logo">x<span>deck</span></div>
      <button id="collapse-btn" onclick="toggleCollapse()" title="折りたたむ">◀</button>
    </div>
    <div id="nav-list"></div>
    <div id="add-btn-wrap">
      <button id="add-btn" onclick="openAddModal()">
        <span>＋</span>
        <span class="add-btn-label">フィードを追加</span>
      </button>
    </div>
  </nav>

  <!-- Mobile overlay -->
  <div id="sidebar-overlay" onclick="closeMobileSidebar()"></div>

  <!-- Main content -->
  <div id="main">
    <div id="topbar">
      <button id="mobile-menu-btn" onclick="openMobileSidebar()">☰</button>
      <div id="current-title">フィードを選択してください</div>
      <div id="current-url"></div>
      <a id="open-x-btn" href="#" target="_blank" rel="noopener" style="display:none">
        <span>↗</span> Xで開く
      </a>
    </div>

    <div id="frame-wrap">
      <div id="loading" class="hidden">
        <div class="spinner"></div>
      </div>
      <div id="timeline-container">
        <div class="placeholder">
          <div class="big-icon">𝕏</div>
          <p>左のサイドバーからフィードを選択</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="modal-root"></div>
<!-- Context menu -->
<div id="ctx-root"></div>

<script>
// ── Default feeds ──
const DEFAULT_FEEDS = [
  { id: 'f1', label: 'gihuboy', url: 'https://x.com/gihuboy?lang=ja', type: 'user' },
  { id: 'f2', label: 'netatank', url: 'https://x.com/netatank?lang=ja', type: 'user' },
  { id: 'f3', label: 'hiyono_leverage', url: 'https://x.com/hiyono_leverage?lang=ja', type: 'user' },
  { id: 'f4', label: 'Rdh47nR6HshJl90', url: 'https://x.com/Rdh47nR6HshJl90', type: 'user' },
  { id: 'f5', label: 'tesuta001', url: 'https://x.com/tesuta001?lang=ja', type: 'user' },
  { id: 'f6', label: 'リスト①', url: 'https://x.com/i/lists/973136757859401728', type: 'list' },
  { id: 'f7', label: 'リスト②', url: 'https://x.com/i/lists/30415907', type: 'list' },
  { id: 'f8', label: 'リスト③', url: 'https://x.com/i/lists/982878496321028096', type: 'list' },
];

// ── State ──
let feeds = loadFeeds();
let currentId = null;
let collapsed = false;

function loadFeeds() {
  try {
    const saved = localStorage.getItem('xdeck_feeds');
    return saved ? JSON.parse(saved) : [...DEFAULT_FEEDS];
  } catch(e) { return [...DEFAULT_FEEDS]; }
}

function saveFeeds() {
  localStorage.setItem('xdeck_feeds', JSON.stringify(feeds));
}

// ── Parse URL → Twitter widget params ──
function parseXUrl(url) {
  try {
    const u = new URL(url);
    const path = u.pathname;

    // List: /i/lists/123
    const listMatch = path.match(/^\/i\/lists\/(\d+)/);
    if (listMatch) {
      return { type: 'list', listId: listMatch[1] };
    }

    // User: /username or /username?...
    const userMatch = path.match(/^\/@?([^/]+)\/?$/);
    if (userMatch) {
      const handle = userMatch[1].replace(/^@/, '');
      if (!['i', 'search', 'home', 'explore'].includes(handle)) {
        return { type: 'user', handle };
      }
    }

    return null;
  } catch(e) { return null; }
}

// ── Build Twitter embed HTML ──
function buildEmbedHTML(feed) {
  const parsed = parseXUrl(feed.url);
  if (!parsed) return null;

  const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  const lang = 'ja';

  if (parsed.type === 'list') {
    return `<a class="twitter-timeline"
      data-lang="${lang}"
      data-theme="${theme}"
      data-tweet-limit="20"
      data-chrome="noheader nofooter noborders"
      href="https://twitter.com/i/lists/${parsed.listId}">
      リストを読み込み中...</a>`;
  }

  if (parsed.type === 'user') {
    return `<a class="twitter-timeline"
      data-lang="${lang}"
      data-theme="${theme}"
      data-tweet-limit="20"
      data-chrome="noheader nofooter noborders"
      href="https://twitter.com/${parsed.handle}">
      @${parsed.handle} のツイートを読み込み中...</a>`;
  }

  return null;
}

// ── Render sidebar nav ──
function renderNav() {
  const list = document.getElementById('nav-list');

  // Group: users & lists
  const users = feeds.filter(f => f.type !== 'list');
  const lists = feeds.filter(f => f.type === 'list');

  let html = '';

  if (users.length) {
    html += `<div class="nav-section-label">アカウント</div>`;
    users.forEach(f => html += navItemHTML(f));
  }
  if (lists.length) {
    html += `<div class="nav-section-label">リスト</div>`;
    lists.forEach(f => html += navItemHTML(f));
  }

  list.innerHTML = html;

  // Attach events
  list.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => selectFeed(el.dataset.id));
    el.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e, el.dataset.id); });
    el.addEventListener('touchstart', (() => {
      let t; return () => { t = setTimeout(() => showCtxMenu(null, el.dataset.id, el), 600); };
    })(), { passive: true });
    el.addEventListener('touchend', () => clearTimeout(undefined), { passive: true });
  });

  // Update active
  list.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === currentId);
  });
}

function navItemHTML(f) {
  const icon = f.type === 'list' ? '📋' : '👤';
  const badge = f.type === 'list' ? 'リスト' : 'ユーザー';
  return `<div class="nav-item" data-id="${f.id}" data-label="${f.label}">
    <div class="nav-icon">${icon}</div>
    <span class="nav-label">${f.label}</span>
    <span class="nav-type-badge">${badge}</span>
  </div>`;
}

// ── Select feed ──
function selectFeed(id) {
  currentId = id;
  const feed = feeds.find(f => f.id === id);
  if (!feed) return;

  // Update topbar
  document.getElementById('current-title').textContent = feed.label;
  document.getElementById('current-url').textContent = feed.url;
  const btn = document.getElementById('open-x-btn');
  btn.href = feed.url;
  btn.style.display = 'flex';

  // Update nav active
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Show loading
  showLoading(true);

  // Build embed
  const embedHTML = buildEmbedHTML(feed);
  const container = document.getElementById('timeline-inner');

  if (!embedHTML) {
    document.getElementById('timeline-container').innerHTML = `
      <div class="placeholder">
        <div class="big-icon">⚠️</div>
        <p>このURLの形式には対応していません</p>
        <p style="font-size:11px;margin-top:4px;color:var(--text-muted)">${feed.url}</p>
      </div>`;
    showLoading(false);
    return;
  }

  // Reset container
  document.getElementById('timeline-container').innerHTML = `<div id="timeline-inner"></div>`;
  document.getElementById('timeline-inner').innerHTML = embedHTML;

  // Load or reload Twitter widget script
  const existing = document.getElementById('tw-widgets-script');
  if (existing) existing.remove();

  const script = document.createElement('script');
  script.id = 'tw-widgets-script';
  script.src = 'https://platform.twitter.com/widgets.js';
  script.charset = 'utf-8';
  script.async = true;
  script.onload = () => {
    if (window.twttr && window.twttr.widgets) {
      window.twttr.widgets.load(document.getElementById('timeline-inner'));
    }
    setTimeout(() => showLoading(false), 2000);
  };
  script.onerror = () => {
    showLoading(false);
    document.getElementById('timeline-container').innerHTML = `
      <div class="placeholder">
        <div class="big-icon">🌐</div>
        <p>ウィジェットの読み込みに失敗しました</p>
        <p style="font-size:11px;margin-top:4px;color:var(--text-muted)">インターネット接続を確認してください</p>
      </div>`;
  };
  document.head.appendChild(script);

  // Mobile: close sidebar
  if (window.innerWidth <= 640) closeMobileSidebar();
}

function showLoading(show) {
  document.getElementById('loading').classList.toggle('hidden', !show);
}

// ── Collapse ──
function toggleCollapse() {
  collapsed = !collapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', collapsed);
  document.getElementById('collapse-btn').textContent = collapsed ? '▶' : '◀';
}

// ── Mobile sidebar ──
function openMobileSidebar() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('sidebar-overlay').classList.add('visible');
}
function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}

// ── Add/Edit Modal ──
function openAddModal(editId = null) {
  const feed = editId ? feeds.find(f => f.id === editId) : null;
  const title = feed ? 'フィードを編集' : 'フィードを追加';

  document.getElementById('modal-root').innerHTML = `
    <div class="modal-bg" id="modal-bg">
      <div class="modal">
        <h3>${title}</h3>
        <div class="form-row">
          <label>表示名</label>
          <input id="inp-label" type="text" placeholder="例: ゆるFIRE情報" value="${feed ? feed.label : ''}">
        </div>
        <div class="form-row">
          <label>X の URL</label>
          <input id="inp-url" type="url" placeholder="https://x.com/username または https://x.com/i/lists/..." value="${feed ? feed.url : ''}">
        </div>
        <div class="modal-actions">
          ${feed ? `<button class="btn danger" onclick="deleteFeed('${editId}')">削除</button>` : ''}
          <button class="btn" onclick="closeModal()">キャンセル</button>
          <button class="btn primary" onclick="saveFeed(${editId ? `'${editId}'` : 'null'})">${feed ? '保存' : '追加'}</button>
        </div>
      </div>
    </div>`;

  document.getElementById('modal-bg').addEventListener('click', e => {
    if (e.target.id === 'modal-bg') closeModal();
  });
  setTimeout(() => document.getElementById('inp-label').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

function saveFeed(editId) {
  const label = document.getElementById('inp-label').value.trim();
  const url   = document.getElementById('inp-url').value.trim();
  if (!label || !url) { alert('表示名とURLを入力してください'); return; }

  const parsed = parseXUrl(url);
  const type = parsed ? (parsed.type === 'list' ? 'list' : 'user') : 'user';

  if (editId) {
    const idx = feeds.findIndex(f => f.id === editId);
    if (idx >= 0) feeds[idx] = { ...feeds[idx], label, url, type };
  } else {
    feeds.push({ id: 'f' + Date.now(), label, url, type });
  }

  saveFeeds();
  closeModal();
  renderNav();
  closeCtxMenu();
}

function deleteFeed(id) {
  if (!confirm(`「${feeds.find(f=>f.id===id)?.label}」を削除しますか？`)) return;
  feeds = feeds.filter(f => f.id !== id);
  if (currentId === id) {
    currentId = null;
    document.getElementById('current-title').textContent = 'フィードを選択してください';
    document.getElementById('current-url').textContent = '';
    document.getElementById('open-x-btn').style.display = 'none';
    document.getElementById('timeline-container').innerHTML = `
      <div class="placeholder">
        <div class="big-icon">𝕏</div>
        <p>左のサイドバーからフィードを選択</p>
      </div>`;
  }
  saveFeeds();
  closeModal();
  renderNav();
  closeCtxMenu();
}

// ── Context menu (right-click / long press) ──
function showCtxMenu(e, id, el) {
  closeCtxMenu();
  const feed = feeds.find(f => f.id === id);
  if (!feed) return;

  let x, y;
  if (e) { x = e.clientX; y = e.clientY; }
  else {
    const rect = el.getBoundingClientRect();
    x = rect.right + 4; y = rect.top;
  }

  document.getElementById('ctx-root').innerHTML = `
    <div class="ctx-menu" id="ctx-menu" style="left:${x}px;top:${y}px;">
      <div class="ctx-item" onclick="openAddModal('${id}')">✏️ 編集</div>
      <div class="ctx-item danger" onclick="deleteFeed('${id}')">🗑 削除</div>
    </div>`;

  setTimeout(() => document.addEventListener('click', closeCtxMenu, { once: true }), 10);
}

function closeCtxMenu() {
  document.getElementById('ctx-root').innerHTML = '';
}

// ── Init ──
renderNav();

// Twitter widget event: hide loading when rendered
window.twttr = window.twttr || {};
document.addEventListener('DOMContentLoaded', () => {
  if (window.twttr && window.twttr.events) {
    window.twttr.events.bind('rendered', () => showLoading(false));
  }
});
</script>
</body>
</html>
